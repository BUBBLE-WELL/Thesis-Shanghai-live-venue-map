<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shanghai Venues Interactive Map</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        #map { height: 100vh; width: 100%; }
        .info-popup {
            background: white;
            padding: 12px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            max-width: 280px;
            font-size: 13px;
        }
        .info-popup h4 { margin-bottom: 6px; color: #1a1a1a; }
        .info-popup p { margin: 4px 0; color: #555; line-height: 1.4; }
        .class-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 4px;
        }
        .canonical { background: #2166AC; color: white; }
        .ss_only { background: #6B6B83; color: white; }
        .legend {
            background: white;
            padding: 12px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-size: 12px;
        }
        .legend-item { margin: 6px 0; display: flex; align-items: center; gap: 8px; }
        .legend-dot { width: 14px; height: 14px; border-radius: 50%; }
        .layer-note { color: #666; font-size: 11px; margin-top: 8px; line-height: 1.35; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Initialize map centered on Shanghai
        const map = L.map('map').setView([31.23, 121.47], 11);

        // Add CartoDB Positron basemap
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© CartoDB contributors',
            maxZoom: 20
        }).addTo(map);

        // Marker styles
        const stylesByLayer = {
            amap: { color: '#2166AC', fillColor: '#2166AC', fillOpacity: 0.82, radius: 6 },
            showstart: { color: '#D6604D', fillColor: '#D6604D', fillOpacity: 0.82, radius: 6 },
            xhs: { color: '#1B9E77', fillColor: '#1B9E77', fillOpacity: 0.82, radius: 6 },
            bge: { color: '#25262B', fillColor: 'white', fillOpacity: 0.05, weight: 3, radius: 9 }
        };

        const layerGroups = {
            amap: L.layerGroup().addTo(map),
            showstart: L.layerGroup().addTo(map),
            xhs: L.layerGroup().addTo(map),
            bge: L.layerGroup().addTo(map)
        };

        function parseCsv(text) {
            const rows = []; let row = []; let cell = ''; let quoted = false;
            for (let i = 0; i < text.length; i += 1) {
                const c = text[i], n = text[i + 1];
                if (c === '"' && quoted && n === '"') { cell += '"'; i += 1; }
                else if (c === '"') quoted = !quoted;
                else if (c === ',' && !quoted) { row.push(cell); cell = ''; }
                else if ((c === '\n' || c === '\r') && !quoted) {
                    if (c === '\r' && n === '\n') i += 1;
                    row.push(cell); if (row.some(v => v !== '')) rows.push(row); row = []; cell = '';
                } else cell += c;
            }
            if (cell || row.length) { row.push(cell); rows.push(row); }
            const headers = rows.shift().map(h => h.trim());
            return rows.map(values => Object.fromEntries(headers.map((h, i) => [h, values[i] || ''])));
        }

        const csv = url => fetch(url).then(r => { if (!r.ok) throw new Error(`${url}: ${r.status}`); return r.text(); }).then(parseCsv);
        const num = value => value === '' || value == null ? '—' : Number(value).toLocaleString(undefined, { maximumFractionDigits: 2 });
        const val = value => value === '' || value == null ? '—' : value;

        Promise.all([
            fetch('data/venue_master_for_map.geojson').then(r => r.json()),
            csv('data/venue_master_for_map_amap_showstart.csv'),
            csv('data/showstart_venue_layers.csv'),
            csv('data/canonical_name_en_DRAFT.csv'),
            csv('data/bge_d0_amap_text_entries.csv'),
            csv('data/bge_d1_batch2_venue_summary.csv'),
            csv('data/xhs_heat_venue_normalized_metrics_v1.csv')
        ]).then(([geojson, platformRows, showstartRows, nameRows, amapBgeRows, crossBgeRows, xhsRows]) => {
            const formal = geojson.features.filter(f => f.properties?.map_feature_id !== 'B0JABCS6YJ');
            const platform = Object.fromEntries(platformRows.map(r => [r.canonical_venue_id || r.map_feature_id, r]));
            const showstart = Object.fromEntries(showstartRows.map(r => [r.canonical_venue_id, r]));
            const names = Object.fromEntries(nameRows.map(r => [r.canonical_venue_id, r]));
            const amapBge = Object.fromEntries(amapBgeRows.map(r => [r.canonical_venue_id, r]));
            const crossBge = Object.fromEntries(crossBgeRows.map(r => [r.canonical_venue_id, r]));
            const xhs = Object.fromEntries(xhsRows.map(r => [r.canonical_venue_id, r]));
            const esc = s => String(s ?? '—').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
            const section = (title, body) => `<p><strong>${title}</strong><br>${body}</p>`;

            formal.forEach(feature => {
                const p = feature.properties, id = p.map_feature_id, d = platform[id] || {}, n = names[id] || {}, a = amapBge[id], b = crossBge[id], x = xhs[id];
                const popup = `<div class="info-popup"><h4>${esc(n.canonical_name_en || p.display_name)}</h4><p><strong>Source name:</strong> ${esc(p.display_name)}<br><strong>ID:</strong> ${esc(id)}</p>
                    ${section('Amap', `Keytag: ${esc(a?.amap_keytag || d.bge_text_amap || '—')}<br>Category: ${esc(a?.amap_category || '—')}<br>Intra-platform BGE: ${num(a?.category_keytag_cosine)}`)}
                    ${section('ShowStart', `Genres across events: ${esc(showstart[id]?.genre_names || '—')}<br>Event count: ${num(showstart[id]?.event_count || d.showstart_event_count)}`)}
                    ${section('XHS', `Posts/screens with engagement: ${num(x?.sample_n_any_engagement)}<br>Mean likes: ${num(x?.likes_rate || '')}<br>Mean saves: ${num(x?.saves_rate || '')}`)}
                    ${section('Cross-platform BGE', b ? `Captions: ${num(b.n_captions)}<br>Mean cosine: ${num(b.mean)}<br>P10/P50/P90: ${num(b.p10)} / ${num(b.p50)} / ${num(b.p90)}` : 'No BGE pair summary')}
                </div>`;
                const coords = feature.geometry.coordinates;
                Object.entries(layerGroups).forEach(([layer, group]) => {
                    const present = layer === 'bge' ? Boolean(b) : layer === 'amap' ? d.has_amap === '1' : layer === 'showstart' ? d.has_showstart === '1' : d.has_xhs === '1' || Boolean(x);
                    if (!present) return;
                    const marker = L.circleMarker([coords[1], coords[0]], stylesByLayer[layer]);
                    marker.bindTooltip(esc(p.display_name), { sticky: true });
                    marker.bindPopup(popup); group.addLayer(marker);
                });
            });
            console.log(`Loaded formal inventory: ${formal.length} venues`);
        }).catch(err => console.error('Could not load map data:', err));
        L.control.layers(null, {
            'Amap': layerGroups.amap,
            'ShowStart': layerGroups.showstart,
            'XHS': layerGroups.xhs,
            'Cross-platform BGE': layerGroups.bge
        }, { collapsed: false, position: 'topright' }).addTo(map);

        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = () => {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `<div style="font-weight: bold; margin-bottom: 8px;">Platform layers</div>
                <div class="legend-item"><div class="legend-dot" style="background:#2166AC"></div><span>Amap</span></div>
                <div class="legend-item"><div class="legend-dot" style="background:#D6604D"></div><span>ShowStart</span></div>
                <div class="legend-item"><div class="legend-dot" style="background:#1B9E77"></div><span>XHS</span></div>
                <div class="legend-item"><div class="legend-dot" style="border:3px solid #25262B;background:white"></div><span>Cross-platform BGE</span></div>
                <div class="layer-note">Hover for venue-level fields; click a marker for a persistent popup.</div>`;
            return div;
        };
        legend.addTo(map);

        // Zoom controls already present by default; add fullscreen toggle
        L.control.zoom({ position: 'topleft' }).addTo(map);
    </script>
</body>
</html>
